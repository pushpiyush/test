<html data-theme="light">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYQtest</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=account_circle,close,filter_list,menu&display=block" />
    <link rel="stylesheet" href="styles/header.css" type="text/css">
    <link rel="stylesheet" href="styles/styles.css" type="text/css">
    <script src="js/script.js" defer></script> 
    <script src="js/header.js" defer></script> 
  </head>
<body>
  
  <header>
  </header>
  

  <article id="menu-modal" class="hide" onclick="menuModalClick(event)">
  </article>
  
  <nav>
    <div id="nav-exam-name" title="exam" onclick="navExamNameClick(this.title)"><span>EXAM</span></div>
    <div id="nav-exam-year"><span>YEAR</span></div>
  </nav>
   
    
  <section id="exam-section">
    <h3>EXAMS</h3>
  <div id="exam">
  </div>
  
  <div id="exam-detail" class="hide">
    <span><img></span>
    <div id="exam-count">
      <div class="count-card" style="background: var(--brand); border: 1px solid var(--brand)">
        <div class="val" style="color: var(--bgcolor);">0</div>
        <div class="lbl" style="color: var(--bgcolor); opacity: 0.8;">Test Attempted</div>
      </div>
      <div class="count-card">
        <div class="val">10</div>
        <div class="lbl">Tests</div>
      </div>
      <div class="count-card">
        <div class="val">2</div>
        <div class="lbl">Year</div>
      </div>
    </div>
  </div>
  </section>
  
  
  <section id="test-section">
    <h3>TESTS</h3>
    <div id="year-filter">
      <div id="select-year">
      </div>
      <button id="filter" type="button" onclick="openFilterModal()">
        Filter<span class="material-symbols-outlined">filter_list</span>
      </button>
    </div>
    <div id="filter-modal">
        <div id="filter-type">
          <div id="reset-filter">Reset</div>
          <div id="sort-by">Sort By</div>
          <div id="eval-stat">Evaluation</div>
          <div id="years">Year</div>
          <div id="shift">Shift</div>
          <div id="session">Session</div>
        </div>
        <div id="filter-options">
          <div id="sort-by-options">
            <label>
            <input type="radio" name="sort" value="dsc" checked>Year (new to old)
            </label>
            <label>
            <input type="radio" name="sort" value="asc">Year (old to new)
            </label>
          </div>
          <div id="eval-stat-options">
            <label>
            <input type="checkbox" name="au" value="attempt" checked>Attempted
            </label>
            <label>
            <input type="checkbox" name="au" value="unattempt" checked>Unattempted
            </label>
          </div>
          <div id="years-options">
            <label><input type="checkbox" name="yf" value="all" checked>All</label>
          </div>
          <div id="shift-options">
            <label>
            <input type="checkbox" name="shift" value="01" checked>Ist
            </label>
            <label>
            <input type="checkbox" name="shift" value="02" checked>IInd
            </label>
          </div>
          <div id="session-options">
            <label>
            <input type="checkbox" name="session" value="01" checked>First
            </label>
            <label>
            <input type="checkbox" name="session" value="02" checked>Second
            </label>
          </div>
        </div>
      </div>
    <div id="test">
      <div class="test-card">
        <div class="test-img"></div>
        <div class="test-body">
          <div class="test-date">22 Jan</div>
          <div class="test-year">2026</div>
        </div>
        <div class="result-preview"></div>
        <div class="test-right">
          <span class="test-shift">Shift 1</span>
          <span class="test-arrow">→</span>
        </div>
    </div>
      <div class="skeleton-test-card"></div>
    </div>
  </section>
  
  
  <footer>
    <p>© 2025 PYQtest. All rights reserved.</p>
    <p><img src="https://img.icons8.com/?size=18&id=62856&format=png&color=000000">  @pushpiyush</p>
  </footer>
</body>
</html>
